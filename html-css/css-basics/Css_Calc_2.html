<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Exercise 2</title>

    <style>


        h1 {
            text-align: center;
        }

        #container {
            width: 50%;
            height: 100px;
            margin: 50px;
            font-size: 0;
            border: 3px solid black;
        }

        .section {
            display: inline-block;
            width: calc(100% / 3);
            height: 100%;
            background-color: lightpink;
            border-right: 3px solid black;
            box-sizing: border-box;
        }

    </style>
</head>

<body>

    <h1>ex 2</h1>

    <div id="container">
        <div class="section"></div>
        <div class="section"></div>
        <div class="section" id="third-section"></div>
    </div>

</body>

</html>
