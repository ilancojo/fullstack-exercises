<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Exercise 2</title>

    <style>

        #parent {
            width: 250px;
            height: 250px;
            background-color: blue;
            position: relative;
            margin-top: 50px;
            margin-left: 50px;
        }

        .child {
            background-color: red;
            position: absolute;
        }

        #child-1 {
            width: 20px;
            height: 100%;
            left: 30px;
        }

        #child-2 {
            width: 100%;
            height: 20px;
            top: 50px;
        }
    </style>
</head>

<body>

    <div id="parent">
        <div class="child" id="child-1"></div>
        <div class="child" id="child-2"></div>
    </div>

</body>

</html>
