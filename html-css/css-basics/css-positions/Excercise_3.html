<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Exercise 3</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            
        }

        .background {
            width: 500px;
            height: 250px;
            background-color: rgb(124, 104, 255);
            position: relative;
            border-radius: 5px;
            margin-top: 40px;
        }

        .text {
            position: absolute;
            font-weight: bold;
            color: black;
            font-size: 20px;
        }

        #money {
            top: 10px;
            left: 15px;
        }

        #time {
            right: 20px;
            bottom: 10px;
        }

        .bar {
            position: absolute;
            bottom: 10px;
            width: 30px;
            background-color: rgb(205, 243, 255);
        }

        #bar-1 {
            height: 35px;
            left: 25px;
        }

        #bar-2 {
            height: 110px;
            left: 85px;
        }

        #bar-3 {
            height: 175px;
            left: 150px;
        }

        #bar-4 {
            height: 160px;
            left: 215px;
        }

        #bar-5 {
            height: 130px;
            left: 280px;
        }

        #bar-6 {
            height: 75px;
            left: 345px;
        }
    </style>
</head>

<body>

    <div class="background">

        <div class="text" id="money">Money</div>
        <div class="text" id="time">Time</div>

        <div class="bar" id="bar-1"></div>
        <div class="bar" id="bar-2"></div>
        <div class="bar" id="bar-3"></div>
        <div class="bar" id="bar-4"></div>
        <div class="bar" id="bar-5"></div>
        <div class="bar" id="bar-6"></div>

    </div>

</body>

</html>
