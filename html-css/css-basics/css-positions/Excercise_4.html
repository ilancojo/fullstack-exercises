<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Exercise 4</title>

    <style>
        body {
            margin: 50px;
        }

        .red-background {
            width: 450px;
            height: 300px;
            background-color: #d9292f;
            position: relative;
            border-radius: 20px 20px 20px 20px;
        }

        .silver-edges {
            width: 80px;
            height: 100px;
            background-color: #b7c4c8;
            position: absolute;
            top: 0;
        }

        #edge-1 {
            left: 0;
            border-radius: 5px 5px 0 0;
        }

        #edge-2 {
            right: 0;
            border-radius: 5px 5px 0 0;
        }

        .white-space {
            width: 300px;
            height: 220px;
            background-color: white;
            position: absolute;
            left: 75px;
            border-radius: 0 0 15px 15px;
        }
    </style>
</head>

<body>

    <div class="red-background">
        <div class="silver-edges" id="edge-1"></div>
        <div class="silver-edges" id="edge-2"></div>
        <div class="white-space"></div>
    </div>

</body>

</html>
