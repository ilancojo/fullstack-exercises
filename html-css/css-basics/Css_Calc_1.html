<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Exercise 1</title>

    <style>

        h1 {
            text-align: center;
            margin-top: 40px;
        }

        #container {
            width: 90%;
            height: 100px;
            margin: 50px auto;
            font-size: 0;
        }

        #left-section {
            display: inline-block;
            width: calc(100% - 20px);
            height: 100%;
            background-color: lightpink;
        }

        #right-section {
            display: inline-block;
            width: 20px;
            height: 100%;
            background-color: lightcoral;
        }
    </style>
</head>

<body>

    <h1>ex 1</h1>

    <div id="container">
        <div id="left-section"></div>
        <div id="right-section"></div>
    </div>

</body>

</html>
