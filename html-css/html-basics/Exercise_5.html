<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact Form</title>

    <style>
        body {
            background-color: #f4f7fb;
            font-family: Arial, sans-serif;
            color: #34495e;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #2980b9;
            font-size: 40px;

        }

        form {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 18px #d0d0d0;
        }

        fieldset {
            border: 2px solid #3498db;
            border-radius: 5px;
            margin-bottom: 20px;
            padding: 20px;
            background-color: #f8fbfd;
        }

        legend {
            background-color:white;
            color: #2980b9;
            font-weight: bold;
            font-size: 20px;
        }

        label,p {
            font-weight: bold;
            font-size: 16px;
        }
        

        input,select,textarea {
            font-size: 16px;
            padding: 10px;
            border: 2px solid #bdc3c7;
            border-radius: 4px;
        }
        
        
        input[type="radio"],input[type="checkbox"] {
            width: auto;
            margin-right: 5px;
        }

        
        input[type="submit"] {
            background-color: #27ae60;
            color: white;
            border: none;
            font-weight: bold;
            padding: 12px 22px;
            margin-right: 10px;
        }

        input[type="reset"] {
            background-color: #e74c3c;
            color: white;
            border: none;
            font-weight: bold;
            padding: 10px 20px;

        }

    </style>
</head>

<body>

    <h1>Contact Us</h1>

    <form action="#" method="post">

        <fieldset>
            <legend>Personal Information</legend>

            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>

            <br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>

            <br><br>

            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" placeholder="(+972) ">
        </fieldset>

        <br>

        <fieldset>
            <legend>Message Details</legend>

            <label for="subject">Subject:</label>
            <select id="subject" name="subject" required>
                <option value="">Select subject</option>
                <option value="question">Question</option>
                <option value="problem">Problem</option>
                <option value="feedback">Feedback</option>
            </select>

            <br><br>

            <p>Priority:</p>

            <input type="radio" id="low" name="priority" value="low" required>
            <label for="low">Low</label>

            <input type="radio" id="medium" name="priority" value="medium">
            <label for="medium">Medium</label>

            <input type="radio" id="high" name="priority" value="high">
            <label for="high">High</label>

            <br><br>

            <label for="message">Message:</label>
            <br>
            <textarea id="message" name="message" rows="5" cols="40" placeholder="Your message..." required></textarea>
        </fieldset>

        <br>

        <fieldset>
            <legend>Preferences</legend>

            <input type="checkbox" id="newsletter" name="newsletter" value="yes">
            <label for="newsletter">Subscribe to newsletter</label>

            <br><br>

            <label for="contactMethod">Contact Method:</label>
            <select id="contactMethod" name="contactMethod">
                <option value="email">Email</option>
                <option value="phone">Phone</option>
                <option value="sms">SMS</option>
            </select>
        </fieldset>

        <br>

        <input type="submit" value="Send Message">
        <input type="reset" value="Reset">

    </form>

</body>

</html>
